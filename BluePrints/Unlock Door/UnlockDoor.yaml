blueprint:
  name: Unlock Front Door when someone comes home
  description: Unlocks a door when someone comes home, turns some lights on, 
  domain: automation
  author: Greg Dodd
  input:
    device_tracker: 
      name: Person Tracker
      selector:
        entity:
          filter:
            domain: person
    lock_to_unlock:
      name: Lock to Unlock
      selector:
        entity:
          filter:
            domain: lock
    zone_to_monitor:
      name: Zone to Monitor
      selector:
        entity:
          filter:
            domain: zone
    inside_lights:
      name: Inside Lights to Turn On
      selector:
        entity:
          filter:
            domain: light
    ignore_inside_if_light_is_on:
      name: Ignore inside if this light is on
      description: if this light is already on, then don't turn on the inside light.
      default: none
      selector:
        entity:
          filter:
            domain: light

triggers:
  - trigger: zone
    entity_id: !input device_tracker
    zone: !input zone_to_monitor
    event: enter
conditions:
  - condition: template
    value_template: >-
      {% set zone_name = states[ '{{ !input zone_to_monitor }}' ].name %}
      {% set was_outside_zone = trigger.from_state is not none and trigger.from_state.state != zone_name %}
      {% set away_for = (now() - trigger.from_state.last_changed).total_seconds() if trigger.from_state is not none else 0 %}
      {{ was_outside_zone and away_for > 300 }}
actions:
  - alias: Actions to Run
    parallel:
      - sequence:
        - condition: state
          entity_id: !input lock_to_unlock
          state: locked
        - action: lock.unlock
          metadata: {}
          data: {}
          target:
            entity_id: !input lock_to_unlock
        alias: Manage Front Door Lock
      - sequence:
        - condition: or
          conditions:
            - condition: sun
              before: sunrise
            - condition: sun
              after: sunset
          alias: Night time
        - alias: Inside Lights
          sequence:
            - condition: state
              entity_id: !input inside_lights
              state: "off"
            - condition: or
              conditions:
                - condition: template
                  value_template: "{{ not is_defined(ignore_inside_if_light_is_on) }}"
                - condition: state
                  entity_id: !input ignore_inside_if_light_is_on
                  state: "off"
            - action: light.turn_on
              metadata: {}
              data:
                brightness_pct: 100
              target:
                entity_id: !input inside_lights
        alias: Manage Lights
mode: single